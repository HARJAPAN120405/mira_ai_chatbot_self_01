<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Concierge - Premium E-commerce Chatbot</title>
  <link rel="stylesheet" href="/src/widget/styles.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(to bottom right, #f9fafb, #f3f4f6);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .demo-content {
      max-width: 1200px;
      padding: 40px;
      text-align: center;
    }
    h1 {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(to right, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 16px 0;
    }
    .demo-content > p {
      font-size: 20px;
      color: #6b7280;
      margin: 0 0 48px 0;
    }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 48px;
    }
    .feature-card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s cubic-bezier(0.16, 0.84, 0.44, 1),
                  box-shadow 0.3s cubic-bezier(0.16, 0.84, 0.44, 1);
    }
    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
    }
    .feature-card .emoji {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }
    .feature-card h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
      color: #111827;
    }
    .feature-card p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="demo-content">
    <h1>Aura Concierge Demo</h1>
    <p>Experience premium e-commerce chat with smooth animations</p>
    <div class="feature-grid">
      <div class="feature-card">
        <span class="emoji">🛍️</span>
        <h3>Browse Products</h3>
        <p>Discover our curated collection</p>
      </div>
      <div class="feature-card">
        <span class="emoji">📦</span>
        <h3>Track Orders</h3>
        <p>Real-time order updates</p>
      </div>
      <div class="feature-card">
        <span class="emoji">💬</span>
        <h3>24/7 Support</h3>
        <p>Always here to help</p>
      </div>
    </div>
  </div>

  <script>
    window.chatbotConfig = {
      botName: "Aura Concierge",
      headerStatus: "Always Available",
      greetingMessage: "Hi! I'm Aura, your shopping assistant. I can help you discover products, track orders, and more. What brings you here today?",
      inputPlaceholder: "Ask anything about orders, products...",
      primaryColor: "#2563eb",
      position: "bottom-right",
      quickActions: [
        { title: "Browse Collections", desc: "View all products", message: "Show me your collections" },
        { title: "View Cart", desc: "See shopping bag", message: "View my cart" },
        { title: "Order Status", desc: "Track orders", message: "Order status" },
        { title: "Track My Order", desc: "Get updates", message: "Track my order" }
      ]
    };
  </script>
  <script type="module" src="/src/widget/index.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.EcomChatbot) {
        window.EcomChatbot.init(window.chatbotConfig);
      }
    });
  </script>
</body>
</html>
